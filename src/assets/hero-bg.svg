<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090516" />
      <stop offset="45%" stop-color="#24053F" />
      <stop offset="75%" stop-color="#0B1E4F" />
      <stop offset="100%" stop-color="#050C1F" />
    </linearGradient>

    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F938FF" />
      <stop offset="50%" stop-color="#D958FF" />
      <stop offset="100%" stop-color="#53E5FF" />
    </linearGradient>

    <linearGradient id="leftWave" x1="160" y1="540" x2="920" y2="540">
      <stop offset="0%" stop-color="#F938FF" stop-opacity="0" />
      <stop offset="30%" stop-color="#F938FF" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#F938FF" stop-opacity="0.2" />
    </linearGradient>

    <linearGradient id="rightWave" x1="1000" y1="540" x2="1760" y2="540">
      <stop offset="0%" stop-color="#53E5FF" stop-opacity="0.2" />
      <stop offset="70%" stop-color="#53E5FF" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#53E5FF" stop-opacity="0" />
    </linearGradient>

    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 540) rotate(90) scale(320 320)">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85" />
      <stop offset="40%" stop-color="#D870FF" stop-opacity="0.42" />
      <stop offset="100%" stop-color="#D870FF" stop-opacity="0" />
    </radialGradient>

    <filter id="blur30" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" />
    </filter>

    <filter id="blur10" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)" />

  <circle cx="960" cy="540" r="350" fill="url(#coreGlow)" />
  <circle cx="610" cy="290" r="230" fill="#9A2DFF" opacity="0.2" filter="url(#blur30)" />
  <circle cx="1300" cy="790" r="220" fill="#18CAFF" opacity="0.2" filter="url(#blur30)" />

  <line x1="120" y1="540" x2="1800" y2="540" stroke="url(#pulse)" stroke-width="6" opacity="0.9" />
  <line x1="120" y1="540" x2="1800" y2="540" stroke="#F5A8FF" stroke-width="16" opacity="0.15" filter="url(#blur10)" />

  <path d="M140 540 C220 420, 300 660, 380 520 C460 380, 530 700, 620 520 C700 360, 760 670, 840 530 C875 470, 895 600, 920 540"
        stroke="url(#leftWave)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9" />
  <path d="M140 540 C220 650, 300 430, 380 560 C460 700, 530 380, 620 560 C700 720, 760 420, 840 555 C875 590, 895 500, 920 540"
        stroke="url(#leftWave)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55" />

  <path d="M1000 540 C1080 420, 1160 660, 1240 520 C1320 380, 1390 700, 1480 520 C1560 360, 1620 670, 1700 530 C1735 470, 1755 600, 1780 540"
        stroke="url(#rightWave)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9" />
  <path d="M1000 540 C1080 650, 1160 430, 1240 560 C1320 700, 1390 380, 1480 560 C1560 720, 1620 420, 1700 555 C1735 590, 1755 500, 1780 540"
        stroke="url(#rightWave)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55" />

  <g transform="translate(960 540)">
    <circle r="106" fill="#FFFFFF" opacity="0.12" />
    <circle r="90" fill="none" stroke="#F4D7FF" stroke-width="3" opacity="0.7" />

    <rect x="-26" y="-58" width="52" height="90" rx="26" fill="none" stroke="#FFF7FF" stroke-width="6" />
    <line x1="0" y1="34" x2="0" y2="66" stroke="#FFF7FF" stroke-width="6" stroke-linecap="round" />
    <path d="M-40 16 C-40 44, -20 64, 0 64 C20 64, 40 44, 40 16" fill="none" stroke="#FFF7FF" stroke-width="6" stroke-linecap="round" />
    <line x1="-30" y1="84" x2="30" y2="84" stroke="#FFF7FF" stroke-width="6" stroke-linecap="round" />
  </g>

  <g opacity="0.16" stroke="#7CCBFF" stroke-width="1">
    <rect x="40" y="120" width="280" height="170" rx="14" />
    <rect x="1620" y="160" width="260" height="150" rx="14" />
    <rect x="1550" y="700" width="300" height="190" rx="14" />
    <line x1="60" y1="170" x2="280" y2="170" />
    <line x1="1640" y1="210" x2="1840" y2="210" />
    <line x1="1570" y1="750" x2="1820" y2="750" />
  </g>
</svg>
